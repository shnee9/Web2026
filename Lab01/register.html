<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>[이서현]-사용자 등록</title>
</head>
<body>
    <header>
        <h1>사용자 등록 신청서</h1>
    </header>
    <main>
        <form>
            <fieldset>
                <legend style="font-weight: bold;">기본 정보 (Essential)</legend>
                <label for="userid">아이디:</label><br>
                <input type="text" id="userid" placeholder="4~12자 영문숫자" required><br><br>
                <label for="pw">비밀번호:</label><br>
                <input type="password" id="pw" required><br><br>
                <label for="email">이메일:</label><br>
                <input type="email" id="email" required><br><br>
            </fieldset>
            <br>
            <fieldset>
                <legend style="font-weight: bold;">부가 정보 (Optional)</legend>
                <label for="phone">연락처:</label><br>
                <input type="text" id="phone" placeholder="010-1234-5678"
                       pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}"><br><br>
                <p>관심 분야:</p>
                <input type="checkbox" id="html">
                <label for="html">HTML5</label>
                <input type="checkbox" id="css">
                <label for="css">CSS3</label>
                <input type="checkbox" id="js">
                <label for="js">JavaScript</label>
                <br><br>
                <label for="level">숙련도: <span id="value">5</span></label><br>
                <input type="range" id="level" min="1" max="10" step="1" value="5"
                oninput="document.getElementById('value').textContent = this.value">
            </fieldset>
            <br>
            <input type="submit" value="가입 신청">
            <input type="reset" value="초기화">
        </form>
    </main>
    <footer>
        <a href="index.html">홈으로</a>
        <p>© 2026 Web Programming Course. All rights reserved.</p>
    </footer>
</body>
</html>
